name: Frontend E2E Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-e2e:
    timeout-minutes: 15
    # Playwright 公式イメージを使用してフォントレンダリングを統一
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        working-directory: ./web-next-js

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web-next-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # コンテナ内では root で動くため HOME を明示
          HOME: /root

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web-next-js/playwright-report/
          retention-days: 7
